servers:
  - name: github-mcp
    address: stdio:///usr/local/bin/github-mcp
    transport: stdio
    version: 1.2.0
    capabilities:
      - {kind: tool, name: create_issue, description: "Create a GitHub issue"}
      - {kind: tool, name: list_repos, description: "List the user's repos"}
      - {kind: resource, name: "repo://README", description: "README of a repo"}
  - name: slack-mcp
    address: https://slack-mcp.internal:8443
    transport: streamable-http
    version: 0.4.1
    capabilities:
      - {kind: tool, name: post_message, description: "Post a message to a channel"}
      - {kind: tool, name: search_messages, description: "Search workspace messages"}
