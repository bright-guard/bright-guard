services:
  postgres:
    image: postgres:16-alpine
    container_name: bright-guard-postgres
    environment:
      POSTGRES_USER: brightguard
      POSTGRES_PASSWORD: brightguard
      POSTGRES_DB: brightguard
    ports:
      # Host port 5433 to avoid colliding with other local postgres instances.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brightguard"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
