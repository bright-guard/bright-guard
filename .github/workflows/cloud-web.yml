name: cloud / web
on:
  push:
    branches: [main]
    paths:
      - 'cloud/web/**'
      - '.github/workflows/cloud-web.yml'
  pull_request:
    paths:
      - 'cloud/web/**'
      - '.github/workflows/cloud-web.yml'

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cloud/web/package-lock.json
      - run: npm ci
      - run: npm run build
