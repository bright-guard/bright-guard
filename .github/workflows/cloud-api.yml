name: cloud / Go
on:
  push:
    branches: [main]
    paths:
      - 'cloud/api/**'
      - 'cloud/shim/**'
      - 'cloud/cli/**'
      - '.github/workflows/cloud-api.yml'
  pull_request:
    paths:
      - 'cloud/api/**'
      - 'cloud/shim/**'
      - 'cloud/cli/**'
      - '.github/workflows/cloud-api.yml'

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: |
            cloud/api/go.sum
            cloud/shim/go.sum
            cloud/cli/seed/go.sum
      - name: api - build / vet / test
        working-directory: cloud/api
        run: |
          go build ./...
          go vet ./...
          go test ./... -count=1
      - name: shim - build
        working-directory: cloud/shim
        run: go build ./...
      - name: cli/seed - build / vet
        working-directory: cloud/cli/seed
        run: |
          go build ./...
          go vet ./...
